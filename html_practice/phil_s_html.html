<!Doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="description" content="A fully structured HTML page">
  <meta name="keywords" content="HTML, CSS, Javascript">
  <meta name="author" content="John Doe">
  <title>My Complete Website</title>
</meta>
<body>
	<header>
		<h1>Welcome to My Webpage</h1>
		<p>This page contains various HTML elements we have learned</p>
	</header>
	<section>
	<h2>Topics Covered</h2>
	<ul>
		<li>HTML Sturcture</li>
		<li>Meta Tags</li>
		<li>Lists</li>
		<li>Tables</li>
		<li>Forms</li>
	</ul>
	</section>
	<section>
		<h2>Student Scores</h2>
		<table border="1">
			<tr>
				<th>Name</th>
				<th>Score</th>
			</tr>
			<tr>
				<td>Bob</td>
				<td>88</td>
			</tr>
			<tr>
				<td>Alice</td>
				<td>88</td>
			</tr>
			<tr>
				<td>Steve</td>
				<td>100</td>
			</tr>
		</table>
	</section>
	<section>
		<h2>Signup Form</h2>
		<form>
			<label for="name">Name:</label>
			<input type="text" id="name" required />
			<br />
			<label for="email">Email:</label>
			<input type="email" id="email" required />
			<br />
			<label for="password">Password:</label>
			<label type="password" id"password" required />
			<select id="country">
				<option value="">Please Choose</option>
				<option value="USA">USA</option>
				<option value="Korea">Korea</option>
				<option value="Mexico">Mexico</option>
			</select>
			<br />
			<br />
			<button type="submit">Sign up</button>
		</form>
	</section>
	<footer>
		<p>Created By *Arnot Hugyecz* - 2026</p>
	</footer>
</body>
</html>
